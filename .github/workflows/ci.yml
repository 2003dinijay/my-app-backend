name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Generate Short SHA
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 2. Set environment variables
      - name: Set up image metadata
        run: |
          echo "REGISTRY=${{ secrets.ACR_NAME }}.azurecr.io" >> $GITHUB_ENV
          echo "IMAGE_NAME=${{ secrets.ACR_NAME }}.azurecr.io/backend" >> $GITHUB_ENV
          echo "TAG=${{ steps.vars.outputs.sha_short }}" >> $GITHUB_ENV

      # 3. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:$TAG .
          docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:latest

      # 4. Login to ACR
      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login $REGISTRY \
          -u ${{ secrets.ACR_USERNAME }} --password-stdin

      # 5. Scan for Vulnerabilities
      - name: Scan for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.TAG }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # 6. Push to ACR
      - name: Push Docker Images to ACR
        run: |
          docker push $IMAGE_NAME:$TAG
          docker push $IMAGE_NAME:latest
      # 7. Trigger Main Repo Deployment
      - name: Trigger Deployment in Main Repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.MAIN_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/2003dinijay/my-3tier-app/dispatches \
            -d '{"event_type": "sub_repo_update"}'